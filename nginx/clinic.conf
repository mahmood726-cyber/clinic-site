server {
    listen 443 ssl http2;
    server_name drmahmood.org www.drmahmood.org;

    ssl_certificate /etc/letsencrypt/live/drmahmood.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drmahmood.org/privkey.pem;

    root /var/www/clinic-site;
    index index.html;

    # Security headers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; frame-src 'self' https://js.stripe.com; connect-src 'self' https://api.stripe.com;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Cache static assets
    location ~* \.(woff2|css|js|png|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cal.com self-hosted — reverse proxy
    location /booking {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Cal.com API and assets
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Custom 404
    error_page 404 /404.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    server_name drmahmood.org www.drmahmood.org;
    return 301 https://$server_name$request_uri;
}
